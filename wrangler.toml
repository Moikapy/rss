name = "0xrss"
main = ".open-next/worker.js"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = false

# Use unbound Worker (billed per-request, higher CPU limits)
[limits]
purpose = "unbound"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "0xrss-db"
database_id = "3b86299e-f7e9-4141-91fe-ab1182d416a6"

# Migrations directory for D1 (drizzle generates here)
migrations_dir = "drizzle"

# Environment variables (available at runtime in the worker)
[vars]
NEXT_PUBLIC_API_URL = "https://api.rss.moikapy.dev"

# Cron Triggers for automatic feed refreshing
[triggers]
crons = ["*/30 * * * *"]

# Observability
[observability]
[observability.logs]
enabled = false
invocation_logs = true